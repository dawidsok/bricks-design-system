<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bricks Brutalist CSS Usage</title>
    <link rel="stylesheet" href="../styles/tokens.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        background: var(--bricks-color-surface);
        color: var(--bricks-color-text-primary);
        font-family: var(--bricks-font-family-mono);
      }

      .shell {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--bricks-space-8);
        padding: var(--bricks-space-4);
      }

      .wordmark {
        font-size: var(--bricks-font-size-sm);
        text-transform: uppercase;
        letter-spacing: var(--bricks-letter-spacing-wordmark);
        color: var(--bricks-color-text-secondary);
      }

      .readout {
        font-size: var(--bricks-font-size-xl);
        font-weight: var(--bricks-font-weight-bold);
        letter-spacing: var(--bricks-letter-spacing-readout);
        font-variant-numeric: tabular-nums;
      }

      .readout[data-state="alert"] {
        color: var(--bricks-color-text-alert);
      }

      .stack {
        width: 100%;
        max-width: var(--bricks-size-container-sm);
        display: flex;
        flex-direction: column;
        gap: var(--bricks-space-6);
      }

      .row {
        display: flex;
        align-items: center;
        gap: var(--bricks-space-2);
        user-select: none;
      }

      .label {
        width: var(--bricks-size-wheel-label-width);
        flex-shrink: 0;
        text-align: right;
        font-size: var(--bricks-font-size-xs);
        text-transform: uppercase;
        letter-spacing: var(--bricks-letter-spacing-label);
        color: var(--bricks-color-text-secondary);
      }

      .track {
        position: relative;
        flex: 1;
        height: var(--bricks-size-wheel-track-height);
        overflow: hidden;
        touch-action: var(--bricks-interaction-touch-action-drum);
      }

      .track::after {
        content: "";
        position: absolute;
        inset-block: 0;
        left: 50%;
        width: var(--bricks-border-width-hairline);
        background: var(--bricks-color-rule-center);
        transform: translateX(-50%);
      }

      .strip {
        position: absolute;
        inset-block-start: 0;
        left: calc(50% - 7.5rem);
        height: 100%;
        display: flex;
        align-items: center;
      }

      .item {
        width: var(--bricks-size-wheel-item-default);
        flex-shrink: 0;
        text-align: center;
        font-size: var(--bricks-font-size-sm);
        opacity: var(--bricks-opacity-inactive);
      }

      .item[aria-current="true"] {
        opacity: var(--bricks-opacity-selected);
      }

      .control {
        width: var(--bricks-size-control);
        height: var(--bricks-size-control);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: var(--bricks-border-width-hairline) solid var(--bricks-color-border-muted);
        border-radius: var(--bricks-border-radius-none);
        color: var(--bricks-color-text-secondary);
        background: transparent;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1 class="wordmark">Bricks Brutalist</h1>
      <div class="readout" data-state="alert">+1.3 EV</div>

      <section class="stack" aria-label="Example instrument controls">
        <div class="row">
          <span class="label">COND</span>
          <div class="track" role="img" aria-label="Example drum with Sunny selected">
            <div class="strip">
              <span class="item">SNOW</span>
              <span class="item" aria-current="true">SUNNY</span>
              <span class="item">OVER</span>
              <span class="item">SHADE</span>
            </div>
          </div>
          <button class="control" aria-label="Unlock wheel">🔓</button>
        </div>
      </section>
    </main>
  </body>
</html>
